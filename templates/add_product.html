<!DOCTYPE html>
<html>
<head>
    <title>Add Product - Creative Studio</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .add-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 107, 53, 0.3);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #FF6B35;
            padding-bottom: 10px;
            font-size: 28px;
            background: linear-gradient(135deg, #ffffff, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        label {
            color: rgba(240, 240, 240, 0.8);
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 5px 0 10px 0;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
            background: rgba(255, 107, 53, 0.1);
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .button-group {
            margin-top: 25px;
            text-align: center;
        }
        
        button {
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 10px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }
        
        .cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #FF6B35;
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 107, 53, 0.5);
        }
        
        .cancel:hover {
            background: #FF6B35;
            color: white;
            transform: translateY(-2px);
            border-color: #FF6B35;
        }
        
        .required-field::after {
            content: " *";
            color: #FF6B35;
        }
    </style>
</head>
<body>
    <div class="add-container">
        <h1>➕ Add New Product</h1>
        
        <form method="POST">
            {% csrf_token %}
            
            <label class="required-field">🏷️ Product Name:</label>
            <input type="text" name="product_name" placeholder="Enter product name" required>
            
            <label class="required-field">💰 Price ($):</label>
            <input type="number" step="0.01" name="product_price" placeholder="0.00" required>
            
            <label>📝 Description:</label>
            <textarea name="product_description" rows="5" placeholder="Enter product description..."></textarea>
            
            <div class="button-group">
                <button type="submit">💾 Save Product</button>
                <a href="{% url 'product_list' %}" class="cancel">❌ Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
