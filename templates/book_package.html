<!DOCTYPE html>
<html>
<head>
    <title>Book Package - Creative Studio</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .booking-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }
        
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #ffffff, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        
        .package-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .package-name {
            font-size: 20px;
            font-weight: bold;
            color: #FF6B35;
        }
        
        .package-price {
            font-size: 24px;
            color: white;
        }
        
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            color: rgba(240, 240, 240, 0.8);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 8px;
            color: white;
        }
        
        button {
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #FF6B35;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="booking-container">
        <h1>📅 Book Your Event</h1>
        
        <div class="package-info">
            <div class="package-name">{{ package.product_name }}</div>
            <div class="package-price">${{ package.product_price }}</div>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <label>📅 Event Date:</label>
            <input type="date" name="event_date" required>
            
            <label>👥 Number of Guests:</label>
            <input type="number" name="guest_count" value="50" min="1" required>
            
            <label>📝 Special Requests (optional):</label>
            <textarea name="special_requests" rows="3"></textarea>
            
            <button type="submit">Confirm Booking →</button>
            <a href="{% url 'user_products' %}" class="cancel">← Back to Packages</a>
        </form>
    </div>
</body>
</html>
