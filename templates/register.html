<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Creative Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .signup-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      width: 400px;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 107, 53, 0.3);
      transition: all 0.3s ease;
    }

    .signup-container:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 107, 53, 0.6);
    }

    .signup-form {
      display: flex;
      flex-direction: column;
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #FF6B35);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: rgba(240, 240, 240, 0.8);
      font-size: 14px;
      font-weight: 500;
    }

    input[type="text"], 
    input[type="email"], 
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 10px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus, 
    input[type="email"]:focus, 
    input[type="password"]:focus {
      outline: none;
      border-color: #FF6B35;
      box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
      background: rgba(255, 107, 53, 0.1);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    button.submit-btn {
      padding: 12px;
      background: linear-gradient(135deg, #FF6B35, #F7931E);
      border: none;
      border-radius: 40px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 15px;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
    }

    button.submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
    }

    .error-message {
      color: #FF6B35;
      font-size: 12px;
      margin-top: 5px;
      display: block;
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
    }

    .login-link p {
      color: rgba(240, 240, 240, 0.7);
      font-size: 14px;
    }

    .login-link a {
      color: #FF6B35;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="signup-container">
    <form id="signup-form" class="signup-form" method="POST">
      {% csrf_token %}
      <h2>Create an Account</h2>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <small id="email-error" class="error-message"></small>
      </div>

      <div class="input-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>
        <small id="name-error" class="error-message"></small>
      </div>

      <div class="input-group">
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" placeholder="Enter your phone number" required>
        <small id="phone-error" class="error-message"></small>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <small id="password-error" class="error-message"></small>
      </div>

      <button type="submit" class="submit-btn">Sign Up</button>

      <div class="login-link">
        <p><span style="color: rgba(240, 240, 240, 0.6);">Already have an account?</span> <a href="{% url 'user_login' %}">Login here</a></p>
      </div>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
