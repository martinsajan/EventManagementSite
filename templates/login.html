<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Creative Studio</title>
    <style>

        .messages-container {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    width: auto;
    max-width: 90%;
}

.message {
    padding: 12px 24px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-weight: 500;
    text-align: center;
    animation: slideDown 0.3s ease;
}

.message.error {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
}

.message.success {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: white;
}

@keyframes slideDown {
    from {
        transform: translateY(-100%);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

        :root {
            --primary-color: #FF6B35;
            --primary-hover: #F7931E;
            --bg-color: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(240, 240, 240, 0.7);
            --error-color: #FF6B35;
            --border-color: rgba(255, 107, 53, 0.3);
            --input-focus: #FF6B35;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .login-container:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 107, 53, 0.6);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #FF6B35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Floating Labels Logic */
        .form-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-control {
            width: 100%;
            height: 56px;
            padding: 20px 16px 6px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .input-control:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
            background: rgba(255, 107, 53, 0.1);
        }

        .floating-label {
            position: absolute;
            left: 16px;
            top: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: 0.2s ease all;
            font-size: 16px;
        }

        /* Label floating state */
        .input-control:focus ~ .floating-label,
        .input-control:not(:placeholder-shown) ~ .floating-label {
            top: 8px;
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 500;
        }

        .input-control:not(:focus) ~ .floating-label {
            color: var(--text-muted);
        }

        /* Password Toggle */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 18px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 20px;
            background: none;
            border: none;
            z-index: 2;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        /* Error Messages */
        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 4px;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-control.invalid {
            border-color: var(--error-color) !important;
        }

        /* Options Row */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Button */
        .btn-login {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Footer */
        .form-footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                box-shadow: none;
                background: var(--card-bg);
            }
            body {
                background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
                align-items: center;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    {% if messages %}
    <div class="messages-container">
        {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

    <main class="login-container">
        <header>
            <h1>Welcome Back</h1>
            <p>Please enter your details to sign in.</p>
        </header>

        <form id="loginForm" method="POST" novalidate>
            {% csrf_token %}
            <!-- Email Field -->
            <div class="form-group">
                <div class="password-wrapper">
                    <input type="email" id="email" name="email" class="input-control" placeholder=" " required>
                    <label for="email" class="floating-label">Email Address</label>
                </div>
                <div id="emailError" class="error-message">Please enter a valid email address.</div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" class="input-control" placeholder=" " required>
                    <label for="password" class="floating-label">Password</label>
                    <button type="button" class="toggle-password" id="togglePassword">
                        👁️
                    </button>
                </div>
                <div id="passwordError" class="error-message">Password must be at least 6 characters.</div>
            </div>

            <!-- Options -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-login">Sign In</button>

            <!-- Footer Links -->
            <div class="form-footer">
                Don't have an account? <a href="{% url 'user_register' %}">Create an account</a>
            </div>
        </form>
    </main>
</body>
</html>
