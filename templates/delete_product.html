<!DOCTYPE html>
<html>
<head>
    <title>Delete Product - Creative Studio</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .delete-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }
        
        h2 {
            background: linear-gradient(135deg, #FF6B35, #e74c3c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: 700;
        }
        
        .warning-icon {
            font-size: 60px;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .product-details {
            background: rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid rgba(255, 107, 53, 0.2);
        }
        
        .product-details p {
            color: rgba(240, 240, 240, 0.9);
            margin: 10px 0;
            font-size: 16px;
        }
        
        .product-details strong {
            color: #FF6B35;
            font-weight: 600;
        }
        
        .warning-text {
            color: #FF6B35;
            font-weight: 600;
            margin: 20px 0;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        
        .button-group {
            margin-top: 25px;
            text-align: center;
        }
        
        .delete-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 10px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }
        
        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
        }
        
        .cancel {
            background: rgba(255, 255, 255, 0.1);
            color: #FF6B35;
            padding: 12px 28px;
            text-decoration: none;
            border-radius: 40px;
            display: inline-block;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 107, 53, 0.5);
        }
        
        .cancel:hover {
            background: #FF6B35;
            color: white;
            transform: translateY(-2px);
            border-color: #FF6B35;
        }
        
        .message-text {
            color: rgba(240, 240, 240, 0.7);
            font-size: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="delete-container">
        <div class="warning-icon">⚠️</div>
        <h2>Delete Product</h2>
        
        <p class="message-text">Are you sure you want to permanently delete this product?</p>
        
        <div class="product-details">
            <p><strong>📦 Product Name:</strong> {{ product.product_name }}</p>
            <p><strong>💰 Price:</strong> ${{ product.product_price }}</p>
        </div>
        
        <p class="warning-text">⚠️ This action cannot be undone!</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="button-group">
                <button type="submit" class="delete-btn">🗑️ Yes, Delete</button>
                <a href="{% url 'product_list' %}" class="cancel">❌ Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
